<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Imposztor</title>
  <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
  <div class="container">
    <h1>Imposztor</h1>

    <div id="joinScreen" class="screen">
      <input type="text" id="nameInput" placeholder="Neved" maxlength="20" autocomplete="off">
      <button id="joinBtn">Csatlakozás</button>
    </div>

    <div id="lobbyScreen" class="screen hidden">
      <h2>Játékosok</h2>
      <ul id="playerList"></ul>
      <button id="startBtn" class="hidden">Új kör</button>
      <p id="waitingText">Várakozás a vezetőre...</p>
    </div>

    <div id="gameScreen" class="screen hidden">
      <div id="wordDisplay"></div>
      <div id="firstPlayerBadge" class="hidden">Te kezdesz!</div>
      <button id="nextRoundBtn" class="hidden">Új kör</button>

      <div id="playerCard" class="player-card">
        <div class="player-card-header">Játékosok</div>
        <ul id="gamePlayerList"></ul>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js?v=2"></script>
</body>
</html>
